<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media List Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Styles -->
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="video-background">
        <div class="gradient-overlay"></div>
    </div>

    <div class="app-container">
        <header class="glass-header">
            <div class="header-content">
                <h1><i class="fa-solid fa-layer-group"></i> My Library Collection</h1>
                <p>A personal dashboard for tracking movies, TV shows, books, and miscellaneous items.</p>
            </div>
            
            <nav class="tabs">
                <button class="tab-btn active" data-tab="Movies"><i class="fa-solid fa-film"></i> Movies</button>
                <button class="tab-btn" data-tab="TV"><i class="fa-solid fa-tv"></i> TV Shows</button>
                <button class="tab-btn" data-tab="Books"><i class="fa-solid fa-book"></i> Books</button>
                <button class="tab-btn" data-tab="Misc"><i class="fa-solid fa-asterisk"></i> Misc</button>
            </nav>
        </header>

        <main class="glass-panel">
            <div class="toolbar">
                <div class="search-box">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search by name, director, comment...">
                </div>

                <div class="filters-container">
                    <div class="filter-group hide" id="yearFilterGroup">
                        <label for="yearFilter">Year</label>
                        <select id="yearFilter">
                            <option value="">All Years</option>
                        </select>
                    </div>

                    <div class="filter-group hide" id="directorFilterGroup">
                        <label for="directorFilter">Director/Author</label>
                        <select id="directorFilter">
                            <option value="">All</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="sortBy">Sort By</label>
                        <select id="sortBy">
                            <option value="none">Default</option>
                            <option value="name_asc">Name (A-Z)</option>
                            <option value="name_desc">Name (Z-A)</option>
                            <option value="year_desc">Year (New-Old)</option>
                            <option value="year_asc">Year (Old-New)</option>
                            <option value="rating_desc">Rating (High-Low)</option>
                            <option value="rating_asc">Rating (Low-High)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-chart-pie"></i></div>
                    <div class="stat-details">
                        <span class="stat-value" id="totalCount">0</span>
                        <span class="stat-label">Total Items</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-regular fa-star"></i></div>
                    <div class="stat-details">
                        <span class="stat-value" id="avgRating">0</span>
                        <span class="stat-label">Avg Rating</span>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table id="dataTable">
                    <thead>
                        <tr id="tableHeader">
                            <!-- Populated by JS -->
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
            
            <div id="noDataMessage" class="no-data-msg hide">
                <i class="fa-regular fa-folder-open"></i>
                <p>No items found matching your filters.</p>
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
